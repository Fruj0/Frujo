# ── Configuration ─────────────────────────────────────────────────────────────
# Set these in a .env file on each server (never commit .env to version control):
#
#   IMAGE_TAG=latest          # "staging" on your staging server
#   SITE_DOMAIN=example.com   # apex domain Traefik routes traffic to
#   SERVICE_NAME=myapp        # unique name for this deployment instance
#
# See CONFIG.md for full setup instructions.
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  app:
    image: YOUR_DOCKERHUB_USERNAME/YOUR_IMAGE_NAME:${IMAGE_TAG:-latest}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.${SERVICE_NAME:-app}.loadbalancer.server.port=3000"
      # Apex domain
      - "traefik.http.routers.${SERVICE_NAME:-app}.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.${SERVICE_NAME:-app}.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME:-app}.tls.certresolver=le"
      - "traefik.http.routers.${SERVICE_NAME:-app}.service=${SERVICE_NAME:-app}"
      # www redirect
      - "traefik.http.routers.${SERVICE_NAME:-app}-www.rule=Host(`www.${SITE_DOMAIN}`)"
      - "traefik.http.routers.${SERVICE_NAME:-app}-www.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME:-app}-www.tls.certresolver=le"
      - "traefik.http.routers.${SERVICE_NAME:-app}-www.middlewares=${SERVICE_NAME:-app}-www-redirect"
      - "traefik.http.routers.${SERVICE_NAME:-app}-www.service=${SERVICE_NAME:-app}"
      - "traefik.http.middlewares.${SERVICE_NAME:-app}-www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.${SERVICE_NAME:-app}-www-redirect.redirectregex.replacement=https://$$1"
      - "traefik.http.middlewares.${SERVICE_NAME:-app}-www-redirect.redirectregex.permanent=true"
    networks:
      - proxy
      - internal

networks:
  proxy:
    external: true
  internal:
    internal: true
