# =============================================================================
# deploy-staging.yml
#
# Deploys to your staging environment on push to the 'staging' branch.
# IMPORTANT: The staging server must have IMAGE_TAG=staging in a .env file
# at STAGING_PATH so docker compose pulls the correct image and does not
# fall back to :latest (which is the production image).
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token
#   DEPLOY_HOST         — IP or hostname of the staging server
#   DEPLOY_USER         — SSH username on the staging server
#   DEPLOY_SSH_KEY      — Private SSH key for the staging deploy user
#   DEPLOY_SSH_PORT     — SSH port on the staging server
#   STAGING_PATH        — Deployment path on the staging server
# =============================================================================

# TODO: update this name to reflect your project and staging domain
name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push staging image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # TODO: replace with YOUR_DOCKERHUB_USERNAME/YOUR_IMAGE_NAME
          tags: |
            YOUR_DOCKERHUB_USERNAME/YOUR_IMAGE_NAME:staging
            YOUR_DOCKERHUB_USERNAME/YOUR_IMAGE_NAME:staging-${{ github.sha }}

  deploy:
    name: Deploy to staging server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync docker-compose.yml to server
        run: |
          rsync -avz --no-perms \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            docker-compose.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.STAGING_PATH }}/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e
            docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
            cd ${{ secrets.STAGING_PATH }}
            IMAGE_TAG=staging docker compose pull
            IMAGE_TAG=staging docker compose up -d --remove-orphans --force-recreate
            docker image prune -f

            # Record the deployed commit for rollback reference
            echo "staging-${{ github.sha }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deployments.txt
